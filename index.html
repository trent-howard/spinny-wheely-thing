<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap"
      rel="stylesheet"
    />
    <title>spinny-wheely-thing</title>
  </head>
  <body>
    <div id="app">
      <div id="wheel-wrap">
        <canvas id="wheel"></canvas>
        <button id="hub-btn" aria-label="Spin the wheel"></button>
        <div id="pointer"></div>
      </div>
      <div id="btn-row">
        <button id="edit-btn">Edit</button>
        <button id="spin-btn">Spin</button>
      </div>
      <p id="winner"></p>
    </div>

    <dialog id="edit-dialog">
      <form id="edit-form" method="dialog">
        <h2>Edit options</h2>
        <p id="edit-help">One option per line, or separated by commas.</p>
        <textarea id="options-input" rows="10" spellcheck="false"></textarea>
        <p id="edit-error" aria-live="polite"></p>
        <div id="dialog-actions">
          <button type="button" id="cancel-btn">Cancel</button>
          <button type="button" id="save-btn">Save</button>
        </div>
      </form>
    </dialog>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
